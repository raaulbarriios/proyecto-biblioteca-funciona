<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech – Portal Colegios</title>
    <meta name="description" content="Portal de reserva de libros para colegios de Algeciras.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen" class="overlay active">
    <div class="login-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <img src="https://www.algeciras.es/export/sites/algeciras/.galleries/estatico/Logo-Algeciras-1-tinta.png" alt="Ayuntamiento de Algeciras">
            </div>
            <h1>BiblioTech</h1>
            <p>Portal de Colegios</p>
        </div>
        <form id="login-form">
            <div id="dynamic-login-fields"></div>
            <div id="login-error" class="error-msg hidden"></div>
            <button type="submit" class="btn-primary full-w" id="login-btn">
                <span id="login-btn-text">Iniciar Sesión</span>
                <span id="login-spinner" class="btn-spinner hidden"></span>
            </button>
        </form>
        <div class="login-footer">
            <span class="role-chip"><i class='bx bxs-school'></i> Colegio</span>
        </div>
    </div>
</div>

<!-- ===== APP ===== -->
<div id="app-container" class="hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="https://www.algeciras.es/export/sites/algeciras/.galleries/estatico/Logo-Algeciras-1-tinta.png" alt="Algeciras" class="sidebar-logo">
            <span>BiblioTech</span>
        </div>

        <!-- School Nav -->
        <nav class="sidebar-nav" id="school-nav">
            <p class="nav-section-label">Mi Panel</p>
            <ul>
                <li class="nav-item active" data-view="dashboard"><i class='bx bxs-dashboard'></i><span>Dashboard</span></li>
                <li class="nav-item" data-view="catalogo"><i class='bx bxs-book-open'></i><span>Catálogo</span></li>
                <li class="nav-item" data-view="mis-pedidos"><i class='bx bxs-time-five'></i><span>Mis Pedidos</span></li>
            </ul>
        </nav>

        <div class="sidebar-user">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar-char">U</div>
                <div class="user-details">
                    <span id="current-user-name">–</span>
                    <small id="current-user-role">–</small>
                </div>
            </div>
            <button id="logout-btn" title="Cerrar Sesión"><i class='bx bx-log-out'></i></button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menu-toggle"><i class='bx bx-menu'></i></button>
                <h2 id="view-title">Dashboard</h2>
            </div>
            <div class="top-bar-right">
                <div class="realtime-pill"><span class="rt-dot"></span>En vivo</div>
                <div class="search-box">
                    <i class='bx bx-search'></i>
                    <input type="text" id="global-search" placeholder="Buscar...">
                </div>
            </div>
        </header>

        <div id="content-area">

            <!-- DASHBOARD -->
            <section id="view-dashboard" class="view active">
                <div class="stats-grid" id="dashboard-stats"></div>
                <div class="recent-grid">
                    <div class="content-card">
                        <div class="card-header"><h3>Actividad Reciente</h3></div>
                        <div id="recent-inventory-list" class="activity-list"></div>
                    </div>
                    <div class="content-card">
                        <div class="card-header"><h3>Mis Pedidos Recientes</h3></div>
                        <div id="recent-pedidos-list" class="activity-list"></div>
                    </div>
                </div>
            </section>

            <!-- SCHOOL: CATÁLOGO -->
            <section id="view-catalogo" class="view">
                <div class="view-header">
                    <div class="filter-bar">
                        <div class="search-wrap-sm">
                            <i class='bx bx-search'></i>
                            <input type="text" id="cat-search" placeholder="Buscar en el catálogo...">
                        </div>
                        <select id="cat-cat-filter"><option value="">Todas las categorías</option></select>
                    </div>
                    <div class="realtime-badge"><span class="rt-dot"></span>Tiempo real</div>
                </div>
                <div id="update-banner" class="update-banner hidden">
                    <i class='bx bx-refresh'></i> El inventario ha sido actualizado
                </div>
                <div class="books-grid" id="catalogo-grid"></div>
            </section>

            <!-- SCHOOL: MIS PEDIDOS -->
            <section id="view-mis-pedidos" class="view">
                <div class="content-card">
                    <div class="table-responsive">
                        <table id="mis-pedidos-table">
                            <thead><tr>
                                <th>Libro</th><th>Cantidad</th><th>Fecha</th><th>Estado</th><th>Notas del Admin</th>
                            </tr></thead>
                            <tbody id="mis-pedidos-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div><!-- /content-area -->
    </main>
</div><!-- /app -->

<div id="notification-container"></div>

<!-- CART OVERLAY -->
<div id="cart-overlay" class="cart-overlay hidden" onclick="app.closeCart()"></div>

<!-- CART PANEL -->
<div id="cart-panel" class="cart-panel">
    <div class="cart-header">
        <h3><i class='bx bx-cart-alt'></i> Mi Carrito</h3>
        <button onclick="app.closeCart()"><i class='bx bx-x'></i></button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
        <p id="cart-summary" class="cart-summary"></p>
        <button id="confirm-order-btn" class="btn-primary" onclick="app.confirmarPedido()">
            <i class='bx bx-send'></i> Confirmar Pedido
        </button>
    </div>
</div>

<!-- CART FAB -->
<button id="cart-fab" class="cart-fab hidden" onclick="app.openCart()">
    <i class='bx bx-cart-alt'></i>
    <span id="cart-count" class="cart-count">0</span>
</button>

<script src="./script.js"></script>
</body>
</html>
