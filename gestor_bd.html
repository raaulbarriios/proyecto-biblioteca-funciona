<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Inventario - Firebase</title>
    <!-- Tailwind CSS (Aesthetic request) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // Check Auth
        const user = JSON.parse(sessionStorage.getItem('bibliotech_user'));
        if (!user || user.role !== 'admin') {
            alert("Acceso denegado. Esta página es solo para administradores.");
            window.location.href = 'index.html';
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                <img src="https://www.algeciras.es/export/sites/algeciras/.galleries/estatico/Logo-Algeciras-1-tinta.png" alt="Algeciras" class="w-10 h-auto mr-3">
                Gestor del Inventario (Admin)
            </h1>
            <div>
                <button onclick="window.location.href='index.html'" class="bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-4 rounded shadow">
                    Vista Colegios
                </button>
                <button onclick="sessionStorage.removeItem('bibliotech_user'); window.location.href='index.html'" class="ml-2 bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded shadow">
                    Cerrar Sesión
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
            <!-- Formulario -->
            <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                <h3 id="form-title" class="text-xl font-semibold text-gray-700 mb-4">Añadir Libro</h3>
                <input type="hidden" id="book-id">
                
                <div id="dynamic-fields"></div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Imagen de Portada (Opcional)</label>
                    <input type="file" id="book-cover" accept="image/*" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <p class="text-xs text-gray-500 mt-1">Sube una imagen para la portada del libro.</p>
                </div>

                <div class="flex gap-2 mt-6">
                    <button id="btn-save" onclick="guardarLibro()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition-colors shadow-sm">
                        Guardar
                    </button>
                    <button onclick="limpiarFormulario()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded transition-colors">
                        Cancelar
                    </button>
                </div>
            </div>

            <!-- Tabla de Libros -->
            <div class="md:col-span-2 overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 bg-white border border-gray-200 rounded-lg overflow-hidden">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Portada</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Título / Autor</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Categoría</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stock</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-libros" class="divide-y divide-gray-200">
                        <!-- Content -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Registro de Reservas -->
        <h2 class="text-2xl font-bold text-gray-800 mb-4 mt-12 border-t pt-8">Registro de Reservas de Colegios</h2>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 bg-white border border-gray-200 rounded-lg overflow-hidden">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Fecha</th>
                        <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Colegio</th>
                        <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Libro</th>
                        <th class="px-6 py-3 text-center text-xs font-medium uppercase tracking-wider">Cantidad</th>
                        <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Estado</th>
                        <th class="px-6 py-3 text-right text-xs font-medium uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-reservas" class="divide-y divide-gray-200">
                    <!-- Reservas Content -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="gestor_bd.js"></script>
</body>
</html>
